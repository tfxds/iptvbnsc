<!doctype html><html><head><meta charset=utf-8><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
html,body{width:1920px;height:1080px}
.s{width:1920px;height:1080px;position:relative;display:flex;align-items:center;justify-content:center;
 background:radial-gradient(1100px 700px at 50% 40%,rgba(40,95,255,.16),transparent 60%),linear-gradient(135deg,#0a1020,#0b1426 45%,#070b16);color:#fff}
.ov{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.modal{position:relative;width:1180px;height:600px;border-radius:34px;display:flex;overflow:hidden;
 background:rgba(16,26,44,.92);border:1px solid rgba(150,180,255,.22);box-shadow:0 40px 100px rgba(0,0,0,.6)}
.left{width:420px;background:linear-gradient(160deg,#13315f,#0a1830);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;border-right:1px solid rgba(255,255,255,.08)}
.left img{width:170px;height:170px;filter:drop-shadow(0 14px 34px rgba(43,108,255,.5))}
.left h1{font-size:46px;font-weight:800}.left h1 span{color:#3b78ff}
.left .tag{color:#9fb6c6;font-size:22px}
.right{flex:1;padding:50px 56px;display:flex;flex-direction:column}
.right h2{font-size:42px;font-weight:800;margin-bottom:28px}
.row{display:flex;justify-content:space-between;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:25px}
.row .k{color:#8ea6b8}.row .v{font-weight:600}
.btns{margin-top:auto;display:flex;gap:18px;padding-top:28px}
.btn{height:74px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:24px;font-weight:800;flex:1}
.btn.primary{background:linear-gradient(135deg,#3b78ff,#1450e0);box-shadow:0 14px 34px rgba(20,80,224,.4),0 0 0 4px rgba(59,120,255,.3)}
.btn.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#c8dce8}
</style></head><body><div class=s><div class=ov></div>
<div class=modal>
 <div class=left><img src="sa_logo.png"><h1>S.A <span>Player</span></h1><div class=tag>Minha conta</div></div>
 <div class=right>
  <h2>Sua conta</h2>
  <div class=row><span class=k>Usuário</span><span class=v>bnscalexadm</span></div>
  <div class=row><span class=k>Validade</span><span class=v>22 jan 2029</span></div>
  <div class=row><span class=k>Dispositivo</span><span class=v>Roku 3960X</span></div>
  <div class=row><span class=k>Conexões</span><span class=v>0 / 2</span></div>
  <div class=row><span class=k>Serial</span><span class=v>35759485-5042-525e</span></div>
  <div class=btns><div class="btn primary">↩ Sair da conta</div><div class="btn ghost">Cancelar</div></div>
 </div>
</div></div></body></html>

<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
html,body{width:1920px;height:1080px;overflow:hidden}
.stage{position:relative;width:1920px;height:1080px;color:#fff;
 background:
  radial-gradient(1200px 800px at 18% 12%, rgba(40,95,255,0.20), transparent 60%),
  radial-gradient(1000px 700px at 88% 95%, rgba(90,40,170,0.22), transparent 60%),
  linear-gradient(135deg,#0a1020 0%,#0b1426 45%,#070b16 100%);}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45}
.b1{width:520px;height:520px;left:-120px;top:-140px;background:#1a52d8}
.b2{width:460px;height:460px;right:-110px;bottom:-150px;background:#5b3aa6}

/* topo */
.top{position:absolute;top:42px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:16px}
.brand img{width:74px;height:74px;filter:drop-shadow(0 8px 20px rgba(43,108,255,.45))}
.brand h1{font-size:40px;font-weight:800;letter-spacing:-1px}
.brand h1 span{color:#3b78ff}
.quick{display:flex;gap:16px}
.qpill{display:flex;align-items:center;gap:12px;padding:0 24px;height:60px;border-radius:16px;
 background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);font-size:20px;font-weight:600;color:#cfdbe6}
.qpill svg{width:24px;height:24px;color:#8ea6b8}
.qpill.on{background:linear-gradient(135deg,#3b78ff,#1450e0);border-color:transparent;color:#fff}
.qpill.on svg{color:#fff}

/* heroes */
.heroes{position:absolute;top:170px;left:90px;right:90px;display:flex;gap:30px;justify-content:center}
.hero{position:relative;width:560px;height:330px;border-radius:28px;overflow:hidden;
 border:1px solid rgba(255,255,255,0.10);box-shadow:0 24px 60px rgba(0,0,0,.45)}
.hero .g{position:absolute;inset:0}
.hero.live .g{background:linear-gradient(140deg,#0e3a6b,#0a2347 70%)}
.hero.movies .g{background:linear-gradient(140deg,#3b2a86,#1c1740 70%)}
.hero.series .g{background:linear-gradient(140deg,#0c5a73,#0a2f47 70%)}
.hero .glow{position:absolute;width:360px;height:360px;border-radius:50%;filter:blur(70px);opacity:.5;right:-80px;top:-120px}
.hero.live .glow{background:#2f7bd6}.hero.movies .glow{background:#7a52e0}.hero.series .glow{background:#19b0c2}
.hero .body{position:absolute;inset:0;padding:40px;display:flex;flex-direction:column;justify-content:space-between}
.hero .ic{width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.18)}
.hero .ic svg{width:46px;height:46px;color:#fff}
.hero h2{font-size:52px;font-weight:900;letter-spacing:-1px}
.hero .sub{font-size:24px;color:#b8d0e6;margin-top:8px;font-weight:500}
.hero .focusring{position:absolute;inset:0;border-radius:28px;border:4px solid #3b78ff;box-shadow:0 0 0 4px rgba(59,120,255,.25)}
.badge{position:absolute;top:40px;right:40px;display:flex;align-items:center;gap:10px;background:rgba(255,60,60,.18);border:1px solid rgba(255,80,80,.5);padding:8px 16px;border-radius:30px;font-size:18px;font-weight:700;color:#ff8a8a}
.badge .d{width:12px;height:12px;border-radius:50%;background:#ff4d4d;box-shadow:0 0 10px #ff4d4d}

/* nav */
.nav{position:absolute;top:540px;left:90px;right:90px;display:flex;gap:24px;justify-content:center}
.ncard{width:402px;height:150px;border-radius:22px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);
 display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.ncard .nic{width:56px;height:56px;border-radius:16px;background:rgba(59,120,255,0.16);display:flex;align-items:center;justify-content:center}
.ncard .nic svg{width:30px;height:30px;color:#5a90ff}
.ncard span{font-size:22px;font-weight:700;letter-spacing:1px;color:#dce8f2}

/* footer */
.footer{position:absolute;bottom:46px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:center;font-size:22px;color:#7f99ad;font-weight:600}
.footer .r{color:#9fb6c6}
.clock{font-size:30px;font-weight:700;color:#cfe6f2}
</style></head><body>
<div class="stage">
  <div class="blob b1"></div><div class="blob b2"></div>

  <div class="top">
    <div class="brand"><img src="sa_logo.png"><h1>S.A <span>Player</span></h1></div>
    <div class="quick">
      <div class="qpill on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Busca</div>
      <div class="qpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>Favoritos</div>
      <div class="qpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Usuário</div>
      <div class="qpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 0 0-1.7-1L16.5 2h-4l-.4 2.4a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.4h4l.4-2.4a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg>Config</div>
    </div>
  </div>

  <div class="heroes">
    <div class="hero live">
      <div class="g"></div><div class="glow"></div>
      <div class="badge"><span class="d"></span>AO VIVO</div>
      <div class="body">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M8 3l4 3 4-3"/></svg></div>
        <div><h2>TV AO VIVO</h2><div class="sub">Atualizado: agora</div></div>
      </div>
      <div class="focusring"></div>
    </div>
    <div class="hero movies">
      <div class="g"></div><div class="glow"></div>
      <div class="body">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 9h20M7 4v5M17 4v5M7 20v-5M17 20v-5"/></svg></div>
        <div><h2>FILMES</h2><div class="sub">Atualizado: agora</div></div>
      </div>
    </div>
    <div class="hero series">
      <div class="g"></div><div class="glow"></div>
      <div class="body">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M7 7l3-4M17 7l-3-4M9 11l5 3-5 3z"/></svg></div>
        <div><h2>SÉRIES</h2><div class="sub">Atualizado: agora</div></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="ncard"><div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M8 3l4 3 4-3"/></svg></div><span>AO VIVO + EPG</span></div>
    <div class="ncard"><div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 8v4l3 2"/></svg></div><span>VER ANTERIORES</span></div>
    <div class="ncard"><div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="14" r="6"/><path d="M19 6l-7 4M16 4l1 3"/></svg></div><span>RÁDIO</span></div>
    <div class="ncard"><div class="nic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 0 0-1.7-1L16.5 2h-4l-.4 2.4a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.4h4l.4-2.4a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg></div><span>CONFIGURAÇÕES</span></div>
  </div>

  <div class="footer">
    <div>Validade: <b style="color:#cfe6f2">22 jan 2029</b></div>
    <div class="r">Conectado: bnscalexadm</div>
  </div>
</div>
</body></html>
